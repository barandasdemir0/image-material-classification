<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Waste Classifier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="logo">EcoScan</div>
        <p class="tagline">Smart &amp; simple waste material classification</p>
      </header>

      <section class="uploader-card card">
        <h2>Upload an image</h2>

        <div id="drop-area" class="drop-area">
          <input id="fileElem" type="file" accept="image/*" />
          <div class="drop-content">
            <div class="icon">📤</div>
            <p>Drag &amp; drop an image here, or click to select</p>
            <small>Accepted: JPG, PNG</small>
          </div>
        </div>

        <div id="preview" class="preview hidden">
          <img id="preview-img" alt="preview" />
        </div>

        <div class="actions">
          <button id="predictBtn" class="btn primary" disabled>Run AI Scan</button>
          <div id="loader" class="loader hidden">
            <div class="spinner"></div>
            <div class="scanning">AI scanning...</div>
          </div>
        </div>
      </section>

      <section id="result" class="result-card card hidden">
        <h3>Prediction</h3>
        <div id="resultContent" class="result-content">
          <!-- populated by JS -->
        </div>
      </section>

      <footer class="footer">Made with ♻️ — Minimal, modern, eco-friendly UI</footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
